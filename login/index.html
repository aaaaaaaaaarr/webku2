<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Minimalist Login & Register Form</title>
    
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            
            <div id="loginSection">
                <div class="login-header">
                    <div class="logo-icon">⚡</div>
                    <h2>Sign In</h2>
                    <p>Access your cyber account</p>
                </div>
                
                <form class="login-form" id="loginForm" novalidate>
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="text" id="email" name="email" required autocomplete="username">
                            <label for="email">Username / Email</label>
                            <span class="input-line"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper password-wrapper">
                            <input type="password" id="password" name="password" required autocomplete="current-password">
                            <label for="password">Password</label>
                            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                                <span class="toggle-icon"></span>
                            </button>
                            <span class="input-line"></span>
                        </div>
                    </div>

                    <div id="loginAlert" style="color: #ff0080; font-size: 0.9rem; margin-bottom: 20px; display: none; font-weight: 500;"></div>

                    <button type="submit" class="login-btn">
                        <span class="btn-text">Sign In</span>
                        <span class="btn-loader"></span>
                        <span class="btn-glow"></span>
                    </button>
                </form>

                <div class="divider">
                    <span>or</span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn google-btn">
                        <span class="social-icon google-icon"></span>
                        <span>Continue with Google</span>
                    </button>
                </div>

                <div class="signup-link">
                    <p>New here? <a href="#" onclick="switchForm('register')">Create an account</a></p>
                </div>
            </div>

            <div id="registerSection" style="display: none;">
                <div class="login-header">
                    <div class="logo-icon">✨</div>
                    <h2>Register</h2>
                    <p>Create your cyber account</p>
                </div>
                
                <form class="login-form" id="registerForm" novalidate>
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="text" id="regUsername" required autocomplete="off">
                            <label for="regUsername">Username</label>
                            <span class="input-line"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="email" id="regEmail" required autocomplete="off">
                            <label for="regEmail">Email Address</label>
                            <span class="input-line"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper password-wrapper">
                            <input type="password" id="regPassword" required autocomplete="off">
                            <label for="regPassword">Password</label>
                            <span class="input-line"></span>
                        </div>
                    </div>

                    <div id="registerAlert" style="color: #ff0080; font-size: 0.9rem; margin-bottom: 20px; display: none; font-weight: 500;"></div>

                    <button type="submit" class="login-btn" style="background: linear-gradient(135deg, #00B2FF 0%, #0022FF 100%);">
                        <span class="btn-text">Create Account</span>
                        <span class="btn-loader"></span>
                        <span class="btn-glow"></span>
                    </button>
                </form>

                <div class="signup-link">
                    <p>Already have an account? <a href="#" onclick="switchForm('login')">Sign In instead</a></p>
                </div>
            </div>

            <div class="success-message" id="successMessage">
                <div class="success-icon">✓</div>
                <h3 id="successTitle">Welcome back!</h3>
                <p id="successSub">Redirecting to your dashboard...</p>
            </div>
        </div>
        
        <div class="background-effects">
            <div class="glow-orb glow-orb-1"></div>
            <div class="glow-orb glow-orb-2"></div>
            <div class="glow-orb glow-orb-3"></div>
        </div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
